<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Site</title>
    <!-- Font Awesome for Brand Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
            --text: #f0f0f2;
            --accent: #ffffff;
            --secondary: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, var(--bg) 100%);
            z-index: -1;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--accent);
        }

        p {
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        a {
            text-decoration: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.2);
        }

        a i {
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>
    <div class="card">
        <h1>Suvin D</h1>
        <p>I like to play around with computers.</p>
        <div class="links">
            <a href="https://github.com/sdinukad/">
                <i class="fa-brands fa-github"></i>
                GitHub
            </a>
            <a href="https://discord.com/users/79215899625656320">
                <i class="fa-brands fa-discord"></i>
                Discord
            </a>
        </div>
    </div>
</body>

</html>
