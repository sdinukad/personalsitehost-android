# Define rate limiting zone outside the server block (in the http context)
limit_req_zone $binary_remote_addr zone=basic:10m rate=10r/s;

server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /var/www/site;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Caching for static assets
    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Uptime JSON - never cache so it always shows fresh data
    location = /uptime.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # Security: Block common bot scan paths
    location ~* (\.php|\.env|wp-admin|xmlrpc) {
        return 444;
    }

    # Basic rate limiting
    limit_req zone=basic burst=20 nodelay;

    # Block directory listing
    autoindex off;
}
